<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IceQube CDO | Premium Ice</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="brand">
                <span class="logo">🧊</span>
                <h1>IceQube</h1>
            </div>
            <p class="loc">Piaping Itum, Macabalan</p>
        </header>

        <main>
            <div id="bulk-notifier" class="bulk-tier-prompt">
                <span>🔥 Bulk Tier Reached! Price: ₱35/bag</span>
            </div>

            <div class="product-card">
                <img src="ice_bg.png" alt="Crystal Ice" class="product-img">
                <h2>Full Dice Ice (3kg)</h2>
                <p class="desc">Crystal clear, slow-melting cubes. Perfect for cocktails and coffee.</p>

                <div class="selection-row">
                    <div class="price-info">
                        <span class="amount">₱40.00</span>
                        <span class="unit">per bag</span>
                    </div>
                    <div class="stepper">
                        <button id="minus">−</button>
                        <span id="qty">15</span>
                        <button id="plus">+</button>
                    </div>
                </div>
            </div>
        </main>

        <div class="footer-stats">
            <span>Total to Pay:</span>
            <span class="total">₱600.00</span>
        </div>

        <footer>
            <button class="confirm-btn">Confirm Order</button>
        </footer>
    </div>
    <script src="app.js"></script>
</body>

</html>
