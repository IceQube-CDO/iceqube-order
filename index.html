<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IceQube | Order Premium Ice</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="status-badge">● Dispatcher Online</div>
            <h1>IceQube CDO</h1>
            <p class="location">📍 Piaping Itum, Macabalan</p>
        </header>

        <main>
            <div id="bulk-notifier" class="bulk-tier-prompt">
                <span>🔥 Bulk Tier Reached! Price: ₱35/bag</span>
            </div>

            <div class="product-card">
                <div class="image-container">
                    <img src="ice_bg.png" alt="Crystal Ice">
                </div>
                <h2>Premium Crystal Ice</h2>
                <p class="product-info">Engineered for maximum density. Slow-melting 22mm cubes.</p>

                <div class="order-controls">
                    <div class="price-box">
                        <span class="label">3kg Bag</span>
                        <span class="price-tag">₱40/bag</span>
                    </div>
                    <div class="qty-stepper">
                        <button class="step-btn" id="minus">-</button>
                        <span id="qty">15</span>
                        <button class="step-btn" id="plus">+</button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <button class="submit-btn">Confirm Order</button>
        </footer>
    </div>
</body>

</html>
